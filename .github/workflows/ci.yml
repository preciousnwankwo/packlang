name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: '0 6 * * 0'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CMAKE_BUILD_PARALLEL_LEVEL: 4
  CC: clang-18
  CXX: clang++-18

jobs:
  build:
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
        build_type: [Debug, Release]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Clang (Linux)
        if: runner.os == 'Linux'
        run: |
          wget -qO- https://apt.llvm.org/llvm-snapshot.gpg.key | sudo tee /etc/apt/trusted.gpg.d/llvm.asc
          sudo add-apt-repository -y 'deb https://apt.llvm.org/noble/ llvm-toolchain-noble-18 main'
          sudo apt-get update -qq
          sudo apt-get install -y -qq clang-18 clang++-18
          echo "CC=clang-18" >> $GITHUB_ENV
          echo "CXX=clang++-18" >> $GITHUB_ENV

      - name: Setup CMake
        uses: jwlawson/actions-setup-cmake@v2
        with:
          cmake-version: 3.25

      - name: Configure
        run: cmake -B build -DCMAKE_BUILD_TYPE=${{ matrix.build_type }} -DCMAKE_CXX_COMPILER="${{ env.CXX }}" -DCMAKE_C_COMPILER="${{ env.CC }}"

      - name: Build
        run: cmake --build build

      - name: Test
        run: ctest --test-dir build --output-on-failure

  sanitizers:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Clang
        run: |
          wget -qO- https://apt.llvm.org/llvm-snapshot.gpg.key | sudo tee /etc/apt/trusted.gpg.d/llvm.asc
          sudo add-apt-repository -y 'deb https://apt.llvm.org/noble/ llvm-toolchain-noble-18 main'
          sudo apt-get update -qq
          sudo apt-get install -y -qq clang-18 clang++-18
          echo "CC=clang-18" >> $GITHUB_ENV
          echo "CXX=clang++-18" >> $GITHUB_ENV

      - name: Configure (ASan)
        run: cmake -B build-asan -DCMAKE_BUILD_TYPE=Debug -DCMAKE_CXX_COMPILER="${{ env.CXX }}" -DCMAKE_C_COMPILER="${{ env.CC }}" -DCMAKE_CXX_FLAGS="-fsanitize=address,undefined -fno-omit-frame-pointer"
      - name: Build (ASan)
        run: cmake --build build-asan
      - name: Test (ASan)
        run: ctest --test-dir build-asan --output-on-failure

      - name: Configure (UBSan)
        run: cmake -B build-ubsan -DCMAKE_BUILD_TYPE=Debug -DCMAKE_CXX_COMPILER="${{ env.CXX }}" -DCMAKE_C_COMPILER="${{ env.CC }}" -DCMAKE_CXX_FLAGS="-fsanitize=undefined -fno-omit-frame-pointer"
      - name: Build (UBSan)
        run: cmake --build build-ubsan
      - name: Test (UBSan)
        run: ctest --test-dir build-ubsan --output-on-failure

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Clang + clang-tidy
        run: |
          wget -qO- https://apt.llvm.org/llvm-snapshot.gpg.key | sudo tee /etc/apt/trusted.gpg.d/llvm.asc
          sudo add-apt-repository -y 'deb https://apt.llvm.org/noble/ llvm-toolchain-noble-18 main'
          sudo apt-get update -qq
          sudo apt-get install -y -qq clang-18 clang-tidy-18
          echo "CC=clang-18" >> $GITHUB_ENV
          echo "CXX=clang++-18" >> $GITHUB_ENV

      - name: Generate compile_commands.json
        run: cmake -B build -DCMAKE_BUILD_TYPE=Debug -DCMAKE_CXX_COMPILER="${{ env.CXX }}" -DCMAKE_C_COMPILER="${{ env.CC }}" -DCMAKE_EXPORT_COMPILE_COMMANDS=ON

      - name: Run clang-tidy
        run: |
          run-clang-tidy-18 -p build -quiet -j4 2>&1 | tee tidy-output.txt
          if grep -q "warning:" tidy-output.txt || grep -q "error:" tidy-output.txt; then
            echo "clang-tidy found issues"
            exit 1
          fi

  fuzz:
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule'
    steps:
      - uses: actions/checkout@v4

      - name: Install Clang
        run: |
          wget -qO- https://apt.llvm.org/llvm-snapshot.gpg.key | sudo tee /etc/apt/trusted.gpg.d/llvm.asc
          sudo add-apt-repository -y 'deb https://apt.llvm.org/noble/ llvm-toolchain-noble-18 main'
          sudo apt-get update -qq
          sudo apt-get install -y -qq clang-18 clang++-18
          echo "CC=clang-18" >> $GITHUB_ENV
          echo "CXX=clang++-18" >> $GITHUB_ENV

      - name: Build fuzz target
        run: |
          cmake -B build-fuzz -DCMAKE_BUILD_TYPE=Debug \
            -DCMAKE_CXX_COMPILER="${{ env.CXX }}" -DCMAKE_C_COMPILER="${{ env.CC }}" \
            -DCMAKE_CXX_FLAGS="-fsanitize=fuzzer,address,undefined -fno-omit-frame-pointer -g"
          cmake --build build-fuzz 2>&1 || echo "No fuzz targets registered yet"
